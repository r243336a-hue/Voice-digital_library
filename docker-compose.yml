version: '3.8'

services:
  # Main Flask API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-library-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - TTS_USE_GPU=0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./audio_cache:/app/audio_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - voice-network

  # PostgreSQL Database (optional, for scaling)
  # Uncomment if you want to use PostgreSQL instead of SQLite
  # db:
  #   image: postgres:15-alpine
  #   container_name: voice-library-db
  #   environment:
  #     - POSTGRES_DB=voice_library
  #     - POSTGRES_USER=voiceuser
  #     - POSTGRES_PASSWORD=voicepass
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   networks:
  #     - voice-network

  # Redis Cache (optional, for scaling)
  # Uncomment if you want to add caching
  # cache:
  #   image: redis:7-alpine
  #   container_name: voice-library-cache
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - voice-network

  # Nginx Reverse Proxy (optional, for production)
  # Uncomment if you want to add reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: voice-library-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - voice-network

networks:
  voice-network:
    driver: bridge

volumes:
  db-data:
